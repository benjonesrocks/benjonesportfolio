<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US College Data Map</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:        #F5F0FF;
      --ink:          #1A1A1A;
      --forest:       #2B7CB8;
      --lavender:     #F0D7FF;
      --orange:       #FFA946;
      --sage:         #E4E4D0;
      --muted:        #8A8A80;
      --inverted:     #F5F0FF;
      --map-lo:       #C2BDB8;
      --map-hi:       #0C3562;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Figtree', sans-serif;
      min-height: 100vh;
    }

    /* ── Section ── */
    .map-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 6rem 3rem;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--forest);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.1rem;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 1.25rem;
      height: 1.5px;
      background: var(--forest);
    }

    /* ── Headings ── */
    h2.map-title {
      font-family: 'EB Garamond', serif;
      font-size: clamp(2.4rem, 4.5vw, 3.8rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      font-weight: 400;
      margin-bottom: 0.65rem;
    }
    h2.map-title em {
      font-style: italic;
      color: var(--forest);
    }
    .map-subtitle {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 520px;
      margin-bottom: 2.25rem;
    }

    /* ── Toggle buttons ── */
    .metric-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 1.75rem;
    }
    .metric-btn {
      font-family: 'Figtree', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.48rem 1.05rem;
      border-radius: 9999px;
      border: 1.5px solid rgba(26,26,26,0.15);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.16s, border-color 0.16s, color 0.16s, transform 0.14s;
    }
    .metric-btn:hover {
      background: var(--lavender);
      border-color: transparent;
      color: var(--ink);
      transform: translateY(-1px);
    }
    .metric-btn.active {
      background: var(--forest);
      border-color: var(--forest);
      color: #fff;
    }

    /* ── Map + legend layout ── */
    .map-layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    /* ── Map card ── */
    .map-card {
      flex: 1;
      min-width: 0;
      background: #fff;
      border: 1.5px solid rgba(26,26,26,0.08);
      border-radius: 16px;
      padding: 1.75rem 1.75rem 1.25rem;
    }
    #us-map {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── State paths ── */
    .state {
      stroke: #fff;
      stroke-width: 0.55;
      cursor: pointer;
      transition: stroke 0.1s, stroke-width 0.1s;
    }
    .state:hover { stroke: var(--ink); stroke-width: 1.4; }
    .state-borders {
      fill: none;
      stroke: #fff;
      stroke-width: 0.5;
      pointer-events: none;
    }

    /* ── Legend panel ── */
    .legend-panel {
      width: 190px;
      flex-shrink: 0;
      background: #fff;
      border: 1.5px solid rgba(26,26,26,0.08);
      border-radius: 16px;
      padding: 1.5rem 1.25rem;
    }
    .legend-metric-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--forest);
      margin-bottom: 1.1rem;
    }
    .legend-items { display: flex; flex-direction: column; gap: 0.55rem; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .legend-range {
      font-size: 0.73rem;
      color: var(--ink);
      line-height: 1.3;
    }
    .legend-note {
      font-size: 0.64rem;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(26,26,26,0.07);
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: var(--ink);
      color: var(--inverted);
      border-radius: 14px;
      padding: 1.1rem 1.3rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      z-index: 9999;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      min-width: 170px;
      max-width: 220px;
    }
    #tooltip.visible { opacity: 1; }

    .tt-state {
      font-family: 'EB Garamond', serif;
      font-size: 1.35rem;
      letter-spacing: -0.02em;
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 0.6rem;
    }
    .tt-metric-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(245,240,255,0.5);
      margin-bottom: 0.2rem;
    }
    .tt-metric-value {
      font-size: 1.55rem;
      font-family: 'EB Garamond', serif;
      letter-spacing: -0.02em;
      color: var(--orange);
      line-height: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 820px) {
      .map-section { padding: 4rem 1.5rem; }
      .map-layout { flex-direction: column; }
      .legend-panel { width: 100%; }
      .legend-items { flex-direction: row; flex-wrap: wrap; gap: 0.6rem 1.2rem; }
    }
  </style>
</head>
<body>

<section class="map-section">
  <div class="section-label">Explore by State</div>
  <h2 class="map-title">US college data, <em>mapped.</em></h2>
  <p class="map-subtitle">Hover any state to explore its average university data. Toggle between metrics (darker blue means a higher value).</p>

  <div class="metric-buttons">
    <button class="metric-btn active" data-metric="admissionRate">Admission Rate</button>
    <button class="metric-btn" data-metric="avgSAT">Avg SAT</button>
    <button class="metric-btn" data-metric="avgStudentSize">Student Size</button>
    <button class="metric-btn" data-metric="inStateTuition">In-State Tuition</button>
    <button class="metric-btn" data-metric="outStateTuition">Out-of-State Tuition</button>
    <button class="metric-btn" data-metric="medianEarnings">Median Earnings</button>
  </div>

  <div class="map-layout">
    <!-- Map -->
    <div class="map-card">
      <svg id="us-map" viewBox="0 0 960 580"></svg>
    </div>

    <!-- Side legend -->
    <div class="legend-panel">
      <div class="legend-metric-label" id="legend-title">Admission Rate</div>
      <div class="legend-items" id="legend-items">
        <!-- populated by JS -->
      </div>
      <div class="legend-note">
        Averages across universities tracked in the dataset. States marked † use supplemental NCES/IPEDS data.
      </div>
    </div>
  </div>
</section>

<!-- Tooltip: shows only the active metric -->
<div id="tooltip">
  <div class="tt-state" id="tt-state"></div>
  <div class="tt-metric-label" id="tt-label"></div>
  <div class="tt-metric-value" id="tt-value"></div>
</div>

//  METRIC CONFIG
// ═══════════════════════════════════════════════════════
const metrics = {
  admissionRate:   { label:"Admission Rate",           fmtShort: v => v.toFixed(1)+"%",         fmtRange: (a,b) => a.toFixed(0)+"% – "+b.toFixed(0)+"%" },
  avgSAT:          { label:"Avg SAT Score",            fmtShort: v => v.toLocaleString(),         fmtRange: (a,b) => Math.round(a).toLocaleString()+" – "+Math.round(b).toLocaleString() },
  avgStudentSize:  { label:"Avg Student Enrollment",   fmtShort: v => v.toLocaleString(),         fmtRange: (a,b) => Math.round(a/1000)+"K – "+Math.round(b/1000)+"K" },
  inStateTuition:  { label:"Avg In-State Tuition",     fmtShort: v => "$"+v.toLocaleString(),     fmtRange: (a,b) => "$"+Math.round(a/1000)+"K – $"+Math.round(b/1000)+"K" },
  outStateTuition: { label:"Avg Out-of-State Tuition", fmtShort: v => "$"+v.toLocaleString(),     fmtRange: (a,b) => "$"+Math.round(a/1000)+"K – $"+Math.round(b/1000)+"K" },
  medianEarnings:  { label:"Median Earnings (10yr)",   fmtShort: v => "$"+v.toLocaleString(),     fmtRange: (a,b) => "$"+Math.round(a/1000)+"K – $"+Math.round(b/1000)+"K" },
};

const NUM_BUCKETS = 6;
const COLOR_LO = "#E3DDD9";  // light warm gray
const COLOR_HI = "#2B7CB8";  // forest blue (design system)

let currentMetric = "admissionRate";

// ═══════════════════════════════════════════════════════
//  COLOR HELPERS
// ═══════════════════════════════════════════════════════
function getRange(metric) {
  const vals = Object.values(stateData).map(d => d[metric]).filter(v => v != null);
  return { min: Math.min(...vals), max: Math.max(...vals) };
}

function makeScale(metric) {
  const { min, max } = getRange(metric);
  return d3.scaleSequential(d3.interpolateRgb(COLOR_LO, COLOR_HI)).domain([min, max]);
}

function stateColor(abbr, metric) {
  const d = stateData[abbr];
  if (!d || d[metric] == null) return "#D8D4CF";
  return makeScale(metric)(d[metric]);
}

// ═══════════════════════════════════════════════════════
//  LEGEND
// ═══════════════════════════════════════════════════════
function buildLegend(metric) {
  document.getElementById("legend-title").textContent = metrics[metric].label;
  const { min, max } = getRange(metric);
  const scale = makeScale(metric);
  const step = (max - min) / NUM_BUCKETS;
  const container = document.getElementById("legend-items");
  container.innerHTML = "";

  // Highest bucket first (dark → light, top to bottom)
  for (let i = NUM_BUCKETS - 1; i >= 0; i--) {
    const lo = min + i * step;
    const hi = min + (i + 1) * step;
    const mid = (lo + hi) / 2;
    const color = scale(mid);

    const item = document.createElement("div");
    item.className = "legend-item";

    const swatch = document.createElement("div");
    swatch.className = "legend-swatch";
    swatch.style.background = color;

    const label = document.createElement("span");
    label.className = "legend-range";
    // top bucket: "X+"
    if (i === NUM_BUCKETS - 1) {
      label.textContent = metrics[metric].fmtRange(lo, hi).split(" – ")[0] + "+";
    } else {
      label.textContent = metrics[metric].fmtRange(lo, hi);
    }

    item.appendChild(swatch);
    item.appendChild(label);
    container.appendChild(item);
  }
}

// ═══════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════
const tip = document.getElementById("tooltip");

function showTip(event, abbr) {
  const d = stateData[abbr];
  if (!d) return;
  const val = d[currentMetric];
  document.getElementById("tt-state").textContent = d.name + (d.sup ? " †" : "");
  document.getElementById("tt-label").textContent = metrics[currentMetric].label;
  document.getElementById("tt-value").textContent = val != null ? metrics[currentMetric].fmtShort(val) : "—";
  moveTip(event);
  tip.classList.add("visible");
}

function moveTip(event) {
  const W = tip.offsetWidth || 200, H = tip.offsetHeight || 110;
  let x = event.clientX + 16, y = event.clientY - 14;
  if (x + W > window.innerWidth  - 10) x = event.clientX - W - 16;
  if (y + H > window.innerHeight - 10) y = event.clientY - H + 14;
  tip.style.left = x + "px";
  tip.style.top  = y + "px";
}

function hideTip() { tip.classList.remove("visible"); }

// ═══════════════════════════════════════════════════════
//  FIPS → STATE ABBR MAP
// ═══════════════════════════════════════════════════════
const fipsToAbbr = {
  "01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT",
  "10":"DE","11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL",
  "18":"IN","19":"IA","20":"KS","21":"KY","22":"LA","23":"ME","24":"MD",
  "25":"MA","26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE",
  "32":"NV","33":"NH","34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND",
  "39":"OH","40":"OK","41":"OR","42":"PA","44":"RI","45":"SC","46":"SD",
  "47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV",
  "55":"WI","56":"WY"
};

function getFips(d) { return d.id.toString().padStart(2, "0"); }

// ═══════════════════════════════════════════════════════
//  D3 MAP
// ═══════════════════════════════════════════════════════
const svg        = d3.select("#us-map");
const projection = d3.geoAlbersUsa().scale(1260).translate([480, 295]);
const path       = d3.geoPath().projection(projection);

function updateColors() {
  svg.selectAll(".state")
    .transition().duration(420).ease(d3.easeCubicOut)
    .attr("fill", d => stateColor(fipsToAbbr[getFips(d)], currentMetric));
}

fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
  .then(r => r.json())
  .then(us => {
    const statesFeature = topojson.feature(us, us.objects.states);
    const borderMesh    = topojson.mesh(us, us.objects.states, (a, b) => a !== b);

    svg.selectAll(".state")
      .data(statesFeature.features)
      .join("path")
        .attr("class", "state")
        .attr("d", path)
        .attr("fill", d => stateColor(fipsToAbbr[getFips(d)], currentMetric))
        .on("mousemove", function(event, d) {
          const abbr = fipsToAbbr[getFips(d)];
          if (abbr) { showTip(event, abbr); }
        })
        .on("mouseleave", hideTip);

    svg.append("path")
      .datum(borderMesh)
      .attr("class", "state-borders")
      .attr("d", path);

    buildLegend(currentMetric);
  })
  .catch(() => {
    svg.append("text")
      .attr("x", 480).attr("y", 295)
      .attr("text-anchor", "middle")
      .style("font-family", "Figtree, sans-serif")
      .style("fill", "#8A8A80")
      .text("Could not load map — please check your internet connection.");
  });

// ═══════════════════════════════════════════════════════
//  TOGGLE BUTTONS
// ═══════════════════════════════════════════════════════
document.querySelectorAll(".metric-btn").forEach(btn => {
  btn.addEventListener("click", function () {
    document.querySelectorAll(".metric-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    currentMetric = this.dataset.metric;
    updateColors();
    buildLegend(currentMetric);
  });
});
</script>
</body>
</html>
